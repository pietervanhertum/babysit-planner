<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oppasplanning · Juli 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --lieze:#C6DEB5; --lieze-ink:#3a5a28;
  --pieter:#70AD47; --pieter-ink:#23401a;
  --renilde:#E9A8D8; --renilde-ink:#6e2059;
  --linda:#5B9BD5; --linda-ink:#173a5c;
  --daanfilip:#F2976C; --daanfilip-ink:#6b3417;
  --kamp:#FFC000; --kamp-ink:#5c4500;
  --weekend:#FBF4DC; --weekend-ink:#8a7a4a;
  --letop:#E5484D;
  --paper:#FCFBF7; --ink:#211d17; --muted:#7c756a;
  --line:#e7e1d4; --card:#ffffff;
  --shadow:0 1px 2px rgba(40,33,20,.05),0 8px 24px rgba(40,33,20,.06);
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:0 18px 80px}

header{padding:38px 0 22px;border-bottom:1px solid var(--line);margin-bottom:8px}
.eyebrow{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600}
h1{font-family:Fraunces,serif;font-weight:900;font-size:clamp(38px,8vw,68px);line-height:.95;margin:.18em 0 .12em;letter-spacing:-.01em}

.controls{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-end;margin:20px 0 26px;justify-content:space-between}
.ctrlgroup{display:flex;flex-direction:column;gap:7px}
.lbl{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600}
.btnrow{display:flex;flex-wrap:wrap;gap:7px}
.fbtn{border:1px solid var(--line);background:var(--card);color:var(--ink);font:inherit;font-size:14px;font-weight:600;padding:8px 15px;border-radius:999px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
.fbtn .pdot{width:11px;height:11px;border-radius:4px}
.fbtn[aria-pressed="true"]{background:var(--ink);color:#fff;border-color:var(--ink)}
.fbtn:focus-visible{outline:2px solid var(--linda);outline-offset:2px}

/* persona banner */
.persona{display:none;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;margin:0 0 22px;border:1px solid var(--line);box-shadow:var(--shadow)}
.persona.on{display:flex}
.persona .pavatar{width:46px;height:46px;border-radius:12px;flex:none;display:flex;align-items:center;justify-content:center;font-family:Fraunces,serif;font-weight:900;font-size:22px;color:#fff}
.persona h2{margin:0;font-family:Fraunces,serif;font-size:22px;font-weight:600}
.persona p{margin:2px 0 0;color:var(--muted);font-size:14px}
.persona .pcount{margin-left:auto;text-align:right;font-size:13px;color:var(--muted)}
.persona .pcount b{display:block;font-family:Fraunces,serif;font-size:28px;color:var(--ink);font-weight:900;line-height:1}

/* ---- CARD VIEW ---- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}
.day{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:var(--shadow);display:flex;flex-direction:column;transition:.2s}
.day.weekendday{background:linear-gradient(180deg,#fffdf4,#fdf8e8)}
.day.dim{opacity:.3;filter:saturate(.5)}
.day.hl{outline:2px solid var(--ink);outline-offset:0}
.day.today{outline:2.5px solid var(--letop);outline-offset:0;box-shadow:0 0 0 5px rgba(229,72,77,.12),var(--shadow)}
.tag-today{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--letop);padding:3px 10px;border-radius:999px}
.day-h{display:flex;align-items:baseline;gap:10px;padding:14px 16px 10px}
.dnum{font-family:Fraunces,serif;font-weight:900;font-size:30px;line-height:1}
.dname{font-weight:700;font-size:15px}
.dmonth{color:var(--muted);font-size:13px;margin-left:auto;font-weight:500}
.tag-we{margin-left:auto;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--weekend-ink);background:#fbeeb8;padding:3px 9px;border-radius:999px}
.slots{display:flex;flex-direction:column;gap:1px;background:var(--line)}
.slot{display:grid;grid-template-columns:74px 1fr;background:#fff;align-items:stretch;min-height:46px}
.slot .when{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;padding:8px 4px 8px 14px}
.slot .who{display:flex;align-items:center;gap:9px;padding:8px 14px;font-weight:600;font-size:15px}
.who .who-dot{width:11px;height:11px;border-radius:4px;flex:none}
.who .who-extra{color:var(--muted);font-weight:500;font-size:13px}
.slot.empty .who{color:var(--muted);font-weight:500;font-style:italic}
.who[data-c="lieze"]{background:var(--lieze);color:var(--lieze-ink)}
.who[data-c="pieter"]{background:var(--pieter);color:#fff}
.who[data-c="renilde"]{background:var(--renilde);color:var(--renilde-ink)}
.who[data-c="linda"]{background:var(--linda);color:#fff}
.who[data-c="daanfilip"]{background:var(--daanfilip);color:var(--daanfilip-ink)}
.who[data-c="kamp"]{background:var(--kamp);color:var(--kamp-ink)}
.who[data-c="weekend"],.who[data-c="none"]{background:#fff}
.slot.mine .who{box-shadow:inset 4px 0 0 var(--ink)}
.tasks{padding:10px 16px 14px;display:flex;flex-direction:column;gap:5px;border-top:1px solid var(--line)}
.task{font-size:13px;color:var(--muted);display:flex;gap:7px;align-items:flex-start}
.task b{color:var(--ink);font-weight:600;flex:none}
.task.note{color:var(--letop);font-weight:600}
.task.camp{color:var(--kamp-ink)}
.task.mytask{background:#fff;border-radius:7px}
.task.mytask b{color:var(--ink)}

/* ---- TABLE VIEW ---- */
.tablewrap{display:none;overflow-x:auto;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);background:#fff}
table{border-collapse:collapse;width:100%;min-width:680px;font-size:14px}
thead th{position:sticky;top:0;background:#fff;text-align:left;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;padding:13px 12px;border-bottom:2px solid var(--line);white-space:nowrap}
tbody td{padding:0;border-bottom:1px solid var(--line);vertical-align:middle}
tbody tr.we{background:#fdf8e8}
tbody tr.dim{opacity:.32}
tbody tr.today{box-shadow:inset 0 0 0 2.5px var(--letop)}
tbody tr.today .tdate .tw{color:var(--letop);font-weight:700}
.tdate{padding:11px 12px;white-space:nowrap;font-weight:600}
.tdate .tn{font-family:Fraunces,serif;font-weight:900;font-size:18px;margin-right:6px}
.tdate .tw{color:var(--muted);font-weight:500;font-size:12px;display:block}
.cell{padding:9px 12px;font-weight:600;height:100%;min-height:40px;display:flex;align-items:center;gap:7px;line-height:1.25}
.cell .cd{width:9px;height:9px;border-radius:3px;flex:none}
.cell small{font-weight:500;color:var(--muted);font-size:12px}
.cell[data-c="lieze"]{background:var(--lieze);color:var(--lieze-ink)}
.cell[data-c="pieter"]{background:var(--pieter);color:#fff}
.cell[data-c="renilde"]{background:var(--renilde);color:var(--renilde-ink)}
.cell[data-c="linda"]{background:var(--linda);color:#fff}
.cell[data-c="daanfilip"]{background:var(--daanfilip);color:var(--daanfilip-ink)}
.cell[data-c="kamp"]{background:var(--kamp);color:var(--kamp-ink)}
.cell[data-c="weekend"]{color:var(--weekend-ink);font-style:italic;font-weight:500}
.cell[data-c="none"]{color:var(--muted)}
.cell.mine{box-shadow:inset 4px 0 0 var(--ink)}
td.notes{padding:9px 12px;font-size:12.5px;color:var(--muted);min-width:170px}
td.notes .nt{display:block}
td.notes .nt.note{color:var(--letop);font-weight:600}
td.notes .nt b{color:var(--ink);font-weight:600}

footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}
@media(max-width:560px){.grid{grid-template-columns:1fr}header{padding-top:26px}.controls{gap:16px}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="eyebrow">Oppasplanning</div>
  <h1>Wie past<br>er op?</h1>
</header>

<div class="controls">
  <div class="ctrlgroup">
    <span class="lbl">Wie ben je?</span>
    <div class="btnrow" id="filterbar"></div>
  </div>
  <div class="ctrlgroup">
    <span class="lbl">Weergave</span>
    <div class="btnrow" id="viewbar">
      <button class="fbtn" data-v="cards" aria-pressed="true">Kaarten</button>
      <button class="fbtn" data-v="table" aria-pressed="false">Tabel</button>
    </div>
  </div>
</div>

<div class="persona" id="persona"></div>

<main class="grid" id="grid"></main>
<div class="tablewrap" id="tablewrap"></div>

<footer>
  Tik op een naam om <b>jouw</b> dagen en taken te zien — je eigen momenten krijgen een streep aan de zijkant. Geel = weekend / vrij blok. Oranje = georganiseerd kamp of activiteit.
</footer>
</div>

<script>
let DATA={rows:[],camps:[]};
const PEOPLE = {
  lieze:   {label:'Lieze',           who:'mama',        var:'--lieze',   initial:'L'},
  pieter:  {label:'Pieter',          who:'papa',        var:'--pieter',  initial:'P'},
  renilde: {label:'Renilde & Ronny', who:'omie & opie', var:'--renilde', initial:'R'},
  linda:   {label:'Linda & Dirk',    who:'oma & opa',   var:'--linda',   initial:'L'},
  daanfilip:{label:'Daan & Filip',   who:'',            var:'--daanfilip',initial:'DF'},
  kamp:    {label:'Kamp / activiteit',who:'',           var:'--kamp',    initial:'K'},
};
const WHEN={ochtend:'Ochtend',dag:'Dag',avond:'Avond'};
const SLOTS=['ochtend','dag','avond'];
let campMap={};
let active='all', view='cards';
// vandaag in lokale tijd als YYYY-MM-DD
const _t=new Date();
const TODAY=`${_t.getFullYear()}-${String(_t.getMonth()+1).padStart(2,'0')}-${String(_t.getDate()).padStart(2,'0')}`;
// eerste dag die vandaag of later is (voor scroll als vandaag buiten juli valt)
let UPCOMING=null;

// task fields that belong to each persona (for "eigen info")
const TASK_OWNER={lieze:['lieze','liezewerk'],pieter:['pieter'],renilde:['omieopie'],linda:['omaopa']};
const TASK_LABEL={lieze:'Lieze',pieter:'Pieter',omaopa:'Oma/Opa',omieopie:'Omie/Opie',liezewerk:'Werk Lieze',daanfilip:'Daan & Filip'};

// person filter
const fbar=document.getElementById('filterbar');
const filters=[['all','Iedereen',null],['lieze','Lieze','--lieze'],['pieter','Pieter','--pieter'],['linda','Oma & Opa','--linda'],['renilde','Omie & Opie','--renilde']];
filters.forEach(([k,lab,col])=>{
  const b=document.createElement('button');b.className='fbtn';b.dataset.k=k;
  b.setAttribute('aria-pressed',k==='all');
  b.innerHTML=(col?`<span class="pdot" style="background:var(${col})"></span>`:'')+lab;
  b.onclick=()=>{active=k;[...fbar.children].forEach(x=>x.setAttribute('aria-pressed',x.dataset.k===k));render();};
  fbar.appendChild(b);
});
// view toggle
const vbar=document.getElementById('viewbar');
[...vbar.children].forEach(b=>b.onclick=()=>{view=b.dataset.v;[...vbar.children].forEach(x=>x.setAttribute('aria-pressed',x.dataset.v===view));render();});

function isWeekend(d){return d==='Zaterdag'||d==='Zondag';}
function involvedSet(r){const s=new Set();SLOTS.forEach(sl=>{if(r[sl].c in PEOPLE && r[sl].c!=='kamp')s.add(r[sl].c);});
  // also if they have a task that day, they're involved
  if(active in TASK_OWNER){TASK_OWNER[active].forEach(f=>{if(r[f])s.add(active);});}
  return s;}
function extraText(v,c){if(!v)return null;const names=['Lieze','Pieter','Renilde','Linda','Ronny','Dirk','Daan & Filip'];return names.includes(v.trim())?null:v;}
function nameFor(cell){const c=cell.c,v=cell.v;
  if(c in PEOPLE)return{dot:PEOPLE[c].var,name:PEOPLE[c].label,extra:extraText(v,c)};
  if(c==='weekend')return{dot:null,name:v||'Weekend / vrij'};
  if(c==='kamp')return{dot:'--kamp',name:v||'Kamp'};
  return{dot:null,name:v||'—',empty:!v};}

// persona banner
function renderPersona(){
  const el=document.getElementById('persona');
  if(active==='all'||!(active in PEOPLE)){el.className='persona';el.innerHTML='';return;}
  const p=PEOPLE[active];let oppasdagen=0,taken=0;
  DATA.rows.forEach(r=>{
    if(SLOTS.some(sl=>r[sl].c===active))oppasdagen++;
    TASK_OWNER[active].forEach(f=>{if(r[f])taken++;});
  });
  el.className='persona on';
  el.innerHTML=`<span class="pavatar" style="background:var(${p.var})">${p.initial}</span>
    <div><h2>${p.label}</h2><p>Hieronder zie je enkel jouw oppasmomenten en taken — de rest is gedimd.</p></div>
    <div class="pcount"><b>${oppasdagen}</b>oppasdagen<br>${taken} taken</div>`;
}

const grid=document.getElementById('grid');
const tablewrap=document.getElementById('tablewrap');

function buildTasks(r){
  const out=[];
  const mineFields = active in TASK_OWNER ? TASK_OWNER[active] : [];
  [['lieze',r.lieze],['pieter',r.pieter],['omaopa',r.omaopa],['omieopie',r.omieopie],['liezewerk',r.liezewerk],['daanfilip',r.daanfilip]].forEach(([f,v])=>{
    if(v)out.push({k:TASK_LABEL[f],v,cls:'',mine:mineFields.includes(f)});
  });
  if(campMap[r.date])out.push({k:'Kamp',v:campMap[r.date],cls:'camp'});
  if(r.opm)out.push({k:'Let op',v:r.opm,cls:'note'});
  return out;
}

function renderCards(){
  grid.innerHTML='';
  DATA.rows.forEach(r=>{
    const involved=involvedSet(r);
    const dim=active!=='all'&&!involved.has(active);
    const day=document.createElement('article');
    day.className='day'+(isWeekend(r.day)?' weekendday':'')+(dim?' dim':'')+(r.date===TODAY?' today':'');
    day.dataset.date=r.date;
    const h=document.createElement('div');h.className='day-h';
    h.innerHTML=`<span class="dnum">${r.dd}</span><span class="dname">${r.day}</span>`+
      (r.date===TODAY?`<span class="tag-today">Vandaag</span>`:isWeekend(r.day)?`<span class="tag-we">Weekend</span>`:`<span class="dmonth">juli</span>`);
    day.appendChild(h);
    const sl=document.createElement('div');sl.className='slots';
    SLOTS.forEach(s=>{
      const info=nameFor(r[s]);const mine=active!=='all'&&r[s].c===active;
      const row=document.createElement('div');row.className='slot'+(info.empty?' empty':'')+(mine?' mine':'');
      const dot=info.dot?`<span class="who-dot" style="background:var(${info.dot})"></span>`:'';
      const extra=info.extra?`<span class="who-extra">· ${info.extra}</span>`:'';
      row.innerHTML=`<span class="when">${WHEN[s]}</span><span class="who" data-c="${r[s].c}">${dot}<span>${info.name}</span>${extra}</span>`;
      sl.appendChild(row);
    });
    day.appendChild(sl);
    let tasks=buildTasks(r);
    if(active!=='all')tasks=tasks.filter(t=>t.mine||t.cls); // own tasks + camp/note context
    if(tasks.length){
      const tf=document.createElement('div');tf.className='tasks';
      tasks.forEach(t=>{const d=document.createElement('div');d.className='task'+(t.cls?' '+t.cls:'')+(t.mine?' mytask':'');
        d.innerHTML=`<b>${t.k}:</b><span>${t.v}</span>`;tf.appendChild(d);});
      day.appendChild(tf);
    }
    grid.appendChild(day);
  });
}

function renderTable(){
  let h=`<table><thead><tr><th>Dag</th><th>Ochtend</th><th>Dag</th><th>Avond</th><th>Werk Lieze</th><th>Taken &amp; notities</th></tr></thead><tbody>`;
  DATA.rows.forEach(r=>{
    const involved=involvedSet(r);const dim=active!=='all'&&!involved.has(active);
    const cls=(isWeekend(r.day)?'we ':'')+(dim?'dim ':'')+(r.date===TODAY?'today':'');
    h+=`<tr class="${cls.trim()}" data-date="${r.date}">`;
    h+=`<td class="tdate"><span class="tn">${r.dd}</span><span class="tw">${r.day}${r.date===TODAY?' · vandaag':''}</span></td>`;
    SLOTS.forEach(s=>{
      const info=nameFor(r[s]);const mine=active!=='all'&&r[s].c===active;
      const dot=info.dot?`<span class="cd" style="background:var(${info.dot})"></span>`:'';
      const ex=info.extra?` <small>· ${info.extra}</small>`:'';
      h+=`<td><div class="cell${mine?' mine':''}" data-c="${r[s].c}">${dot}<span>${info.name}${ex}</span></div></td>`;
    });
    h+=`<td><div class="cell" data-c="none">${r.liezewerk||'—'}</div></td>`;
    // notes column
    let notes=[];
    [['lieze',r.lieze],['pieter',r.pieter],['omaopa',r.omaopa],['omieopie',r.omieopie],['daanfilip',r.daanfilip]].forEach(([f,v])=>{if(v)notes.push(`<span class="nt"><b>${TASK_LABEL[f]}:</b> ${v}</span>`);});
    if(campMap[r.date])notes.push(`<span class="nt"><b>Kamp:</b> ${campMap[r.date]}</span>`);
    if(r.opm)notes.push(`<span class="nt note">⚠ ${r.opm}</span>`);
    h+=`<td class="notes">${notes.join('')||'—'}</td></tr>`;
  });
  h+=`</tbody></table>`;
  tablewrap.innerHTML=h;
}

function render(){
  renderPersona();
  if(view==='cards'){grid.style.display='grid';tablewrap.style.display='none';renderCards();}
  else{grid.style.display='none';tablewrap.style.display='block';renderTable();}
}

let firstPaint=true;
function scrollToToday(){
  const target=TODAY>=DATA.rows[0].date && TODAY<=DATA.rows[DATA.rows.length-1].date ? TODAY : UPCOMING;
  if(!target)return;
  const sel=view==='cards'?`.day[data-date="${target}"]`:`tr[data-date="${target}"]`;
  const el=document.querySelector(sel);
  if(el){
    const reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    el.scrollIntoView({behavior:reduce?'auto':'smooth',block:'center'});
  }
}

const _origRender=render;
render=function(){_origRender();if(firstPaint){firstPaint=false;requestAnimationFrame(scrollToToday);}};

// data uit los bestand laden, daarna pas renderen
function showError(msg){
  document.getElementById('grid').innerHTML=
    `<div style="padding:24px;color:var(--letop);font-weight:600">${msg}</div>`;
}
fetch('data.json?v='+Date.now())
  .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
  .then(d=>{
    DATA=d;
    campMap={};(DATA.camps||[]).forEach(c=>campMap[c.date]=c.otto);
    UPCOMING=(DATA.rows.find(r=>r.date>=TODAY)||{}).date||null;
    render();
  })
  .catch(e=>showError('Kon de planning (data.json) niet laden: '+e.message));
</script>
</body>
</html>
